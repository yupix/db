services:
  control-db:
    image: postgres:16-alpine
    container_name: control-db
    environment:
      POSTGRES_DB: dbcontrol
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - control-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dbcontrol"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: db-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:admin123@control-db:5432/dbcontrol
      JWT_SECRET: change-me-in-production-super-secret-key
      RUST_LOG: info,backend=debug
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      control-db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: db-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  control-pgdata:
